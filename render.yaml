services:
  - type: web_service
    name: qa-job-scraper
    repo: https://github.com/AtmanTest/qa-job-scraper
    branch: main
    autoDeploy: yes
    env: node
    plan: free
    region: oregon
    healthCheckPath: /health
    buildCommand: |
      npm install
      npx playwright install chromium --with-deps || true
      node scrapers/warmup.js || true
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # add below in Render dashboard:
      # SUPABASE_URL, SUPABASE_KEY, CRON_TOKEN
